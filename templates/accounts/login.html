{% extends 'base.html' %}

{% block title %}| Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0" style="border-radius: 16px; overflow: hidden;">
            <div style="background: linear-gradient(135deg, #1a4731, #52b788); padding: 30px; text-align: center;">
                <h2 class="text-white fw-bold mb-1">⚡ AuraFit</h2>
                <p class="text-white opacity-75 mb-0">Welcome back, legend.</p>
            </div>
            <div class="card-body p-4">
                <h5 class="fw-bold mb-4 text-center" style="color: #1a4731;">Login to your account</h5>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold" style="color: #2d6a4f;">{{ field.label }}</label>
                        <input 
                            type="{{ field.field.widget.input_type }}" 
                            name="{{ field.html_name }}" 
                            class="form-control" 
                            placeholder="{{ field.label }}"
                            style="border-color: #95d5b2; border-radius: 8px;"
                        >
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-dark w-100 py-2 mt-2" style="border-radius: 8px;">
                        Login →
                    </button>
                </form>
                <hr style="border-color: #d8f3dc;">
                <p class="text-center mb-0" style="color: #2d6a4f;">
                    Don't have an account? 
                    <a href="/accounts/register/" style="color: #52b788; font-weight: 600;">Register</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
