{% extends 'base.html' %}

{% block title %}| Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="fw-bold mb-4 text-center">Login to AuraFit</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark w-100 mt-2">Login</button>
                </form>
                <p class="text-center mt-3">Don't have an account? <a href="/accounts/register/">Register</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
